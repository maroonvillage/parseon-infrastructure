name: Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      ecr_image_tag:
        description: "ECR image tag for prod deploy (e.g. git SHA). Ignored for dev."
        required: false
        default: latest

# Prevent concurrent runs against the same environment
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------------------------------------------
  # Plan — runs on every PR targeting main, posts results as a comment
  # -------------------------------------------------------------------------
  plan:
    name: Plan (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/dev/plan_output.txt', 'utf8');
            const outcome = '${{ steps.plan.outcome }}';
            const body = [
              `#### Terraform Plan — dev \`${outcome}\``,
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              plan.slice(0, 60000), // GitHub comment size limit
              '```',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # -------------------------------------------------------------------------
  # Apply dev — runs automatically on every merge to main
  # -------------------------------------------------------------------------
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: write
    environment: dev
    env:
      TFC_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TFC_ORGANIZATION: maroonvillage-hcp-organization
    defaults:
      run:
        working-directory: environments/dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          workspace: parseon-agentic-dev
          directory: environments/dev

      - name: Create Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          workspace: parseon-agentic-dev
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}

      - name: Apply Run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        id: apply
        continue-on-error: true
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          run: ${{ steps.run.outputs.run_id }}
          comment: "Triggered by GitHub Actions (push to main, commit ${{ github.sha }})"

      - name: Post apply result to merged PR
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.apply.outcome }}';
            const runLink = '${{ steps.run.outputs.run_link }}';
            const body = [
              `#### Terraform Apply — dev \`${outcome}\``,
              `[View run in HCP Terraform](${runLink})`,
            ].join('\n');
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.data.find(p => p.merged_at);
            if (pr) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              core.warning(`No merged PR found for commit ${context.sha} — skipping apply comment`);
            }

      - name: Fail if apply failed
        if: steps.apply.outcome != 'success'
        run: exit 1

  # -------------------------------------------------------------------------
  # Apply prod — manual only via workflow_dispatch, requires image tag input
  # -------------------------------------------------------------------------
  apply-prod:
    name: Apply (prod)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    environment: prod
    env:
      TFC_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TFC_ORGANIZATION: maroonvillage-hcp-organization
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@v4

      - name: Set ECR image tag
        run: echo 'ecr_image_tag = "${{ inputs.ecr_image_tag }}"' > ecr_image_tag_override.auto.tfvars

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: upload
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          workspace: parseon-agentic-prod
          directory: environments/prod

      - name: Create Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: run
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          workspace: parseon-agentic-prod
          configuration_version: ${{ steps.upload.outputs.configuration_version_id }}

      - name: Apply Run
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ${{ env.TFC_ORGANIZATION }}
          run: ${{ steps.run.outputs.run_id }}
          comment: "Triggered by GitHub Actions (workflow_dispatch, ecr_image_tag=${{ inputs.ecr_image_tag }})"
